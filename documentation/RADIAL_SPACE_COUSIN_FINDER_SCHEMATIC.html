
<h2 class="sr-only">Radial space cousin finder - compares lens behavior across rotations</h2>
<div style="padding:1rem 0;">
<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
<div>
<label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px;">rotation (degrees)</label>
<input type="range" min="1" max="90" value="15" id="angle" style="width:140px;">
<span id="angleOut" style="font-size:13px;font-weight:500;margin-left:6px;">15°</span>
</div>
<div>
<label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px;">correlation threshold</label>
<input type="range" min="90" max="100" value="97" step="0.5" id="thresh" style="width:140px;">
<span id="threshOut" style="font-size:13px;font-weight:500;margin-left:6px;">0.970</span>
</div>
<button id="runBtn" style="margin-top:16px;">find cousins</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:16px;">
<div style="background:var(--surface-1);border-radius:var(--radius);padding:12px 16px;flex:1;">
<div style="font-size:12px;color:var(--text-secondary);">grid size</div>
<div style="font-size:20px;font-weight:500;" id="gridSize">6×6×6 = 216</div>
</div>
<div style="background:var(--surface-1);border-radius:var(--radius);padding:12px 16px;flex:1;">
<div style="font-size:12px;color:var(--text-secondary);">cousin pairs found</div>
<div style="font-size:20px;font-weight:500;" id="pairsFound">—</div>
</div>
<div style="background:var(--surface-1);border-radius:var(--radius);padding:12px 16px;flex:1;">
<div style="font-size:12px;color:var(--text-secondary);">unique families</div>
<div style="font-size:20px;font-weight:500;" id="families">—</div>
</div>
<div style="background:var(--surface-1);border-radius:var(--radius);padding:12px 16px;flex:1;">
<div style="font-size:12px;color:var(--text-secondary);">redundancy</div>
<div style="font-size:20px;font-weight:500;" id="redundancy">—</div>
</div>
</div>
<canvas id="viz" style="width:100%;height:360px;"></canvas>
<div id="log" style="margin-top:12px;font-size:12px;color:var(--text-secondary);max-height:200px;overflow-y:auto;font-family:var(--font-mono);line-height:1.6;"></div>
</div>
<script>
const canvas=document.getElementById('viz');
canvas.width=canvas.clientWidth*2;
canvas.height=360*2;
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

const activations=[
  {name:'id',fn:x=>x},
  {name:'sin',fn:x=>Math.sin(x)},
  {name:'cos',fn:x=>Math.cos(x)},
  {name:'tanh',fn:x=>Math.tanh(x)},
  {name:'relu',fn:x=>Math.max(0,x)},
  {name:'abs',fn:x=>Math.abs(x)},
  {name:'sq',fn:x=>x*x},
  {name:'sign',fn:x=>x>0?1:x<0?-1:0},
  {name:'sinc',fn:x=>x===0?1:Math.sin(x)/x},
  {name:'gauss',fn:x=>Math.exp(-x*x)},
  {name:'soft',fn:x=>Math.log(1+Math.exp(x))},
  {name:'step',fn:x=>x>=0?1:0},
  {name:'neg',fn:x=>-x},
  {name:'sqrt',fn:x=>Math.sqrt(Math.abs(x))},
];

const N=6;
const testData=[];
for(let i=0;i<64;i++) testData.push(-3+6*i/63);

function lensAt(ix,iy,iz){
  let idx=(ix*N*N+iy*N+iz);
  let a1=activations[idx%activations.length];
  let a2=activations[(idx*7+3)%activations.length];
  let scale=0.5+((idx*13)%20)/10;
  let bias=((idx*17)%20-10)/10;
  return{
    name:`${a1.name}(${a2.name})`,
    fn:x=>a1.fn(a2.fn(scale*x+bias)),
    ix,iy,iz
  };
}

function signature(lensFn){
  return testData.map(x=>{let v=lensFn(x);return isFinite(v)?v:0;});
}

function pearson(a,b){
  let n=a.length,sx=0,sy=0,sxx=0,syy=0,sxy=0;
  for(let i=0;i<n;i++){sx+=a[i];sy+=b[i];sxx+=a[i]*a[i];syy+=b[i]*b[i];sxy+=a[i]*b[i];}
  let num=n*sxy-sx*sy;
  let den=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));
  return den===0?0:num/den;
}

function rotateY(ix,iy,iz,angle){
  let x=(ix-N/2+0.5),y=(iy-N/2+0.5),z=(iz-N/2+0.5);
  let c=Math.cos(angle),s=Math.sin(angle);
  let rx=x*c+z*s,rz=-x*s+z*c;
  return[rx+N/2-0.5,y+N/2-0.5,rz+N/2-0.5];
}

function nearestGrid(fx,fy,fz){
  let ix=Math.round(fx),iy=Math.round(fy),iz=Math.round(fz);
  if(ix<0||ix>=N||iy<0||iy>=N||iz<0||iz>=N)return null;
  return[ix,iy,iz];
}

let results=null;

function run(){
  const angle=parseInt(document.getElementById('angle').value)*Math.PI/180;
  const thresh=parseFloat(document.getElementById('thresh').value)/100;
  const log=document.getElementById('log');
  log.innerHTML='';

  let lenses=[];
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    let l=lensAt(x,y,z);
    l.sig=signature(l.fn);
    lenses.push(l);
  }

  let pairs=[];
  let cousinMap=new Map();

  for(let i=0;i<lenses.length;i++){
    let l=lenses[i];
    let[rx,ry,rz]=rotateY(l.ix,l.iy,l.iz,angle);
    let nearest=nearestGrid(rx,ry,rz);
    if(!nearest)continue;
    let target=lenses[nearest[0]*N*N+nearest[1]*N+nearest[2]];
    let corr=Math.abs(pearson(l.sig,target.sig));
    if(corr>=thresh){
      pairs.push({from:l,to:target,corr});
      let key=Math.min(i,nearest[0]*N*N+nearest[1]*N+nearest[2]);
      if(!cousinMap.has(key))cousinMap.set(key,new Set());
      cousinMap.set(key,cousinMap.get(key).add(i).add(nearest[0]*N*N+nearest[1]*N+nearest[2]));
    }
  }

  let familyCount=cousinMap.size;
  let involvedLenses=new Set();
  cousinMap.forEach(s=>s.forEach(v=>involvedLenses.add(v)));
  let uniqueCount=lenses.length-involvedLenses.size+familyCount;
  let redund=((1-uniqueCount/lenses.length)*100).toFixed(1);

  document.getElementById('pairsFound').textContent=pairs.length;
  document.getElementById('families').textContent=familyCount;
  document.getElementById('redundancy').textContent=redund+'%';

  pairs.sort((a,b)=>b.corr-a.corr);
  let top=pairs.slice(0,20);
  for(let p of top){
    log.innerHTML+=`<div>[${p.from.ix},${p.from.iy},${p.from.iz}] ${p.from.name} ↔ [${p.to.ix},${p.to.iy},${p.to.iz}] ${p.to.name}  r=${p.corr.toFixed(4)}</div>`;
  }
  if(pairs.length>20) log.innerHTML+=`<div style="color:var(--text-muted);">... and ${pairs.length-20} more pairs</div>`;

  results={lenses,pairs,cousinMap,involvedLenses};
  drawViz();
}

function drawViz(){
  ctx.clearRect(0,0,W,H);
  if(!results)return;
  let{lenses,pairs,cousinMap,involvedLenses}=results;
  let camAy=0.7;
  function proj(ix,iy,iz,side){
    let x=(ix-N/2+0.5)*2,y=(iy-N/2+0.5)*2,z=(iz-N/2+0.5)*2;
    let c=Math.cos(camAy),s=Math.sin(camAy);
    let xr=x*c+z*s,zr=-x*s+z*c;
    let sc=H*0.35/(16+zr);
    let cx=side==='left'?W*0.25:W*0.75;
    return[cx+xr*sc,H/2-y*sc,zr];
  }

  ctx.font='500 24px sans-serif';
  ctx.fillStyle='var(--text-secondary)';
  ctx.textAlign='center';
  ctx.fillText('original',W*0.25,30);
  ctx.fillText('rotated',W*0.75,30);

  let allPts=[];
  for(let i=0;i<lenses.length;i++){
    let l=lenses[i];
    let p1=proj(l.ix,l.iy,l.iz,'left');
    let isCousin=involvedLenses.has(i);
    allPts.push({x:p1[0],y:p1[1],z:p1[2],cousin:isCousin,side:'left'});
    let p2=proj(l.ix,l.iy,l.iz,'right');
    allPts.push({x:p2[0],y:p2[1],z:p2[2],cousin:isCousin,side:'right'});
  }
  allPts.sort((a,b)=>a.z-b.z);
  for(let pt of allPts){
    let alpha=0.3+0.7*((pt.z+8)/16);
    let size=Math.max(2.5,5-pt.z*0.12);
    ctx.beginPath();ctx.arc(pt.x,pt.y,size,0,Math.PI*2);
    if(pt.cousin){
      ctx.fillStyle=pt.side==='left'?`rgba(234,179,8,${Math.min(1,Math.max(0.3,alpha))})`:`rgba(168,85,247,${Math.min(1,Math.max(0.3,alpha))})`;
    }else{
      ctx.fillStyle=`rgba(100,100,100,${Math.min(0.4,Math.max(0.1,alpha*0.4))})`;
    }
    ctx.fill();
  }

  let topPairs=pairs.slice(0,8);
  for(let p of topPairs){
    let p1=proj(p.from.ix,p.from.iy,p.from.iz,'left');
    let p2=proj(p.to.ix,p.to.iy,p.to.iz,'right');
    ctx.beginPath();
    ctx.moveTo(p1[0],p1[1]);
    ctx.lineTo(p2[0],p2[1]);
    ctx.strokeStyle=`rgba(234,179,8,${0.15+p.corr*0.3})`;
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
}

document.getElementById('angle').addEventListener('input',e=>{
  document.getElementById('angleOut').textContent=e.target.value+'°';
});
document.getElementById('thresh').addEventListener('input',e=>{
  document.getElementById('threshOut').textContent=(e.target.value/100).toFixed(3);
});
document.getElementById('runBtn').addEventListener('click',run);
run();
</script>
